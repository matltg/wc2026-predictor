/* ═══════════════════════════════════════════════════════════════
   STAR RATING ENGINE
   score = prob * marketReliability * edgeBonus → mapped to 1-5 stars
   ═══════════════════════════════════════════════════════════════ */
const MARKET_RELIABILITY = {
  ou:        1.00,  // Over/Under — most reliable
  "1x2":     0.95,  // Match result
  teamGoals: 0.88,  // Team goal count (0/1/2+)
  combo:     0.90,  // Result + O/U combined
  scoreFamily:0.75, // Score exact family (e.g. 1-0/2-0/3-0)
  scoreExact: 0.55, // Single exact score
  handicap:  0.92,  // Asian handicap
};

function starRating(prob, marketType, bookOdd = null) {
  const rel = MARKET_RELIABILITY[marketType] || 0.80;
  let edgeBonus = 1.0;
  if (bookOdd && bookOdd > 1) {
    const impliedProb = 1 / bookOdd;
    const edge = (prob - impliedProb) / impliedProb; // relative edge
    if (edge > 0.08) edgeBonus = 1.15;
    else if (edge > 0.03) edgeBonus = 1.07;
    else if (edge < -0.05) edgeBonus = 0.88; // bookmaker disagrees strongly
  }
  const score = prob * rel * edgeBonus;
  let stars, label, color;
  if (score >= 0.72)      { stars = 5; label = "Très haute confiance"; }
  else if (score >= 0.62) { stars = 4; label = "Haute confiance"; }
  else if (score >= 0.52) { stars = 3; label = "Confiance modérée"; }
  else if (score >= 0.42) { stars = 2; label = "Faible confiance"; }
  else                    { stars = 1; label = "Spéculatif"; }
  const colors = ["#ff5252","#ff5252","#ffab40","#ffd740","#00e676"];
  return { stars, label, score: +(score*100).toFixed(1), color: colors[stars-1] };
}

function Stars({ n, color }) {
  return (
    <span style={{ letterSpacing: "1px" }}>
      {[1,2,3,4,5].map(i => (
        <span key={i} style={{ color: i <= n ? (color||C.star) : C.starOff, fontSize:"13px" }}>★</span>
      ))}
    </span>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ELO ENGINE  (K=60, MoV multiplier)
   ═══════════════════════════════════════════════════════════════ */
function eloExp(a,b){return 1/(1+Math.pow(10,(b-a)/400));}
function movMul(d){if(d<=1)return 1.0;if(d===2)return 1.5;if(d===3)return 1.75;return Math.min(2.5,1.75+(d-3)*0.1);}
function updateElo(eH,eA,sH,sA){
  const d=Math.abs(sH-sA),mov=movMul(d),eXH=eloExp(eH,eA);
  const rH=sH>sA?1:sH===sA?0.5:0;
  const dH=Math.round(60*mov*(rH-eXH));
  return{newH:eH+dH,newA:eA-dH,dH,dA:-dH};
}

/* ═══════════════════════════════════════════════════════════════
   POISSON + DIXON-COLES
   ═══════════════════════════════════════════════════════════════ */
function fact(n){return n<=1?1:n*fact(n-1);}
function pPMF(k,l){if(l<=0)return k===0?1:0;return Math.pow(l,k)*Math.exp(-l)/fact(Math.min(k,20));}
function dcC(h,a,lH,lA,p=-0.10){
  if(h===0&&a===0)return 1-lH*lA*p;if(h===0&&a===1)return 1+lH*p;
  if(h===1&&a===0)return 1+lA*p;if(h===1&&a===1)return 1-p;return 1;
}
function buildMatrix(lH,lA,max=7){
  const m=[];let t=0;
  for(let h=0;h<=max;h++){m[h]=[];for(let a=0;a<=max;a++){const v=pPMF(h,lH)*pPMF(a,lA)*dcC(h,a,lH,lA);m[h][a]=v;t+=v;}}
  for(let h=0;h<=max;h++)for(let a=0;a<=max;a++)m[h][a]/=t;
  return m;
}

/* ── All derived probabilities from matrix ── */
function deriveAll(m, home, away) {
  let pH=0,pD=0,pA=0;
  let o15=0,o25=0,o35=0,u25=0,btts=0;
  const tgH=[0,0,0,0], tgA=[0,0,0,0]; // 0,1,2,3+ goals per team

  for(let h=0;h<m.length;h++)for(let a=0;a<m[h].length;a++){
    const v=m[h][a],t=h+a;
    if(h>a)pH+=v; else if(h===a)pD+=v; else pA+=v;
    if(t>1.5)o15+=v; if(t>2.5)o25+=v; else u25+=v;
    if(t>3.5)o35+=v; if(h>0&&a>0)btts+=v;
    tgH[Math.min(h,3)]+=v; tgA[Math.min(a,3)]+=v;
  }

  // Best score
  let bv=0,bh=0,ba=0;
  for(let h=0;h<m.length;h++)for(let a=0;a<m[h].length;a++)if(m[h][a]>bv){bv=m[h][a];bh=h;ba=a;}

  // Top 6 scorelines
  const lines=[];
  for(let h=0;h<m.length;h++)for(let a=0;a<m[h].length;a++)lines.push({h,a,p:m[h][a]});
  lines.sort((x,y)=>y.p-x.p);

  // Score families
  const famHome = [1,2,3].reduce((s,g)=>{
    const sub=[0,1,2].map(a=>m[g]?.[a]||0).reduce((a,b)=>a+b,0);
    return s+sub;
  },0);
  // Result + OU combos
  const combos=[
    {label:`${home} & Over 1.5`,  p: sumWhere(m,(h,a)=>h>a&&h+a>1.5), type:"combo"},
    {label:`${home} & Over 2.5`,  p: sumWhere(m,(h,a)=>h>a&&h+a>2.5), type:"combo"},
    {label:`${home} & Under 2.5`, p: sumWhere(m,(h,a)=>h>a&&h+a<=2.5),type:"combo"},
    {label:`Nul & Under 2.5`,     p: sumWhere(m,(h,a)=>h===a&&h+a<=2.5),type:"combo"},
    {label:`${away} & Under 2.5`, p: sumWhere(m,(h,a)=>h<a&&h+a<=2.5), type:"combo"},
    {label:`${home} & Over 1.5 buts`,p:sumWhere(m,(h,a)=>h>a&&h+a>1.5),type:"combo"},
  ];

  return {pH,pD,pA,o15,o25,o35,u25,btts,tgH,tgA,
    best:{h:bh,a:ba,p:bv}, top6:lines.slice(0,6), combos};
}
function sumWhere(m,cond){
  let s=0;
  for(let h=0;h<m.length;h++)for(let a=0;a<m[h].length;a++)if(cond(h,a))s+=m[h][a];
  return s;
}

/* ── Lambda computation ── */
function computeL(home,away,liveElo,wMod=1,aMod=1,sMod=1,xH=[],xA=[]){
  const eH=liveElo[home]||ELO_BASE[home]||1850,eA=liveElo[away]||ELO_BASE[away]||1850;
  const qH=QUAL[home]||{atk:1.5,def:1.0,form:"WWDLD"},qA=QUAL[away]||{atk:1.5,def:1.0,form:"WWDLD"};
  const efH=1/(1+Math.pow(10,-(eH-eA)/400)),efA=1-efH;
  const fmS=f=>(f||"WWDLD").slice(-5).split("").reduce((s,c)=>s+(c==="W"?3:c==="D"?1:0),0);
  const fH=0.85+(fmS(qH.form)/15)*0.30,fA=0.85+(fmS(qA.form)/15)*0.30;
  const injH=[...(BASE_INJURIES[home]||[]),...xH],injA=[...(BASE_INJURIES[away]||[]),...xA];
  const mal=(inj,r)=>Math.min(0.28,inj.filter(i=>i.r===r||i.r==="MID").reduce((s,i)=>s+i.i,0));
  let lH=1.30*(0.6+efH*0.8)*(qH.atk/1.9)*fH*(1-mal(injH,"ATT"))*wMod*aMod*sMod;
  let lA=1.30*(0.6+efA*0.8)*(qA.atk/1.9)*fA*(1-mal(injA,"ATT"))*wMod*aMod*sMod;
  const k1=`${home}_${away}`,k2=`${away}_${home}`;
  if(H2H_BIAS[k1]){lH*=(1+H2H_BIAS[k1]);lA*=(1-H2H_BIAS[k1]*0.5);}
  if(H2H_BIAS[k2]){lA*=(1+H2H_BIAS[k2]);lH*=(1-H2H_BIAS[k2]*0.5);}
  return{lH:+Math.max(0.2,Math.min(4,lH)).toFixed(3),lA:+Math.max(0.2,Math.min(4,lA)).toFixed(3),
    eH,eA,eHB:ELO_BASE[home]||1850,eAB:ELO_BASE[away]||1850,injH,injA};
}

function wxM(temp,precip,wind,wmo){
  let mod=1,notes=[];
  if(temp>33){mod-=0.07;notes.push(`Chaleur ${temp}degC`);}else if(temp>29){mod-=0.04;notes.push(`Chaud ${temp}degC`);}
  if(precip>2){mod-=0.06;notes.push(`Pluie ${precip}mm`);}else if(precip>0.5){mod-=0.03;notes.push("Légère pluie");}
  if(wind>50){mod-=0.05;notes.push(`Vent fort ${wind}km/h`);}
  if([65,82,95,96,99].includes(wmo)){mod-=0.08;notes.push("Conditions difficiles");}
  return{mod:Math.max(0.75,mod),notes};
}
function altM(alt){if(alt>2000)return 0.82;if(alt>1500)return 0.88;if(alt>1000)return 0.93;if(alt>500)return 0.97;return 1;}

async function fetchWx(venue,date){
  const st=STADIUMS[venue]||STADIUMS["Default"];
  try{
    const d=date?date.slice(0,10):new Date().toISOString().slice(0,10);
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${st.lat}&longitude=${st.lon}&hourly=temperature_2m,precipitation,windspeed_10m,weathercode&timezone=auto&start_date=${d}&end_date=${d}`);
    const j=await r.json();const idx=Math.min(20,j.hourly.time.length-1);
    return{temp:j.hourly.temperature_2m[idx],precip:j.hourly.precipitation[idx],wind:j.hourly.windspeed_10m[idx],wmo:j.hourly.weathercode[idx],stadium:st.name,alt:st.alt};
  }catch{return null;}
}

   ═══════════════════════════════════════════════════════════════ */
function BetRow({label, sublabel, prob, marketType, bookOdd, highlight}) {
  const rating = starRating(prob, marketType, bookOdd);
  const isTop = rating.stars >= 4;
  return (
    <div style={{...S.brow,...(isTop||highlight?S.browHL:{})}}>
      <div style={S.bleft}>
        <div style={S.blabel}>{label}</div>
        {sublabel && <div style={S.bsub}>{sublabel}</div>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
        <div style={S.bright}>
          <div style={{...S.bpct,color:rating.color}}>{pct(prob)}</div>
          <div style={S.bodd}>Cote ≈ {odd(prob)}{bookOdd?` . book ${bookOdd}`:""}</div>
        </div>
        <div style={{textAlign:"center",minWidth:"80px"}}>
          <Stars n={rating.stars} color={rating.color}/>
          <div style={{fontSize:"9px",color:rating.color,marginTop:"1px"}}>{rating.label}</div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════ */
function App() {
  const [matches,setMatches]=useState([]);
  const [loading,setLoading]=useState(true);
  const [apiErr,setApiErr]=useState(null);
  const [apiKey,setApiKey]=useState("209aac3aaffd8d9e1e2e1a48190dccd0");
  const [sel,setSel]=useState(null);
  const [stake,setStake]=useState("normal");
  const [pred,setPred]=useState(null);
  const [busy,setBusy]=useState(false);
  const [tab,setTab]=useState("matches");
  const [grille,setGrille]=useState([]);
  const [log,setLog]=useState([]);
  const [liveElo,setLiveElo]=useState({...ELO_BASE});
  const [eloHistory,setEloHistory]=useState([]);
  const [eloLive,setEloLive]=useState(false);

  const addLog=msg=>setLog(p=>[`${new Date().toLocaleTimeString("fr")} -- ${msg}`,...p].slice(0,15));

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      // Helper: normalize match list + compute ELO
      const processMatches=(list,src)=>{
        setMatches(list);
        addLog(`[OK] ${list.length} matchs charges (${src})`);
        const played=list.filter(m=>m.homeScore!==null&&m.awayScore!==null);
        if(played.length>0){
          let elo={...ELO_BASE};const hist=[];
          played.forEach(m=>{
            const eH=elo[m.home]||1850,eA=elo[m.away]||1850;
            const{newH,newA,dH,dA}=updateElo(eH,eA,m.homeScore,m.awayScore);
            elo[m.home]=newH;elo[m.away]=newA;
            hist.push({home:m.home,away:m.away,sH:m.homeScore,sA:m.awayScore,dH,dA,date:m.date});
          });
          setLiveElo(elo);setEloHistory(hist);setEloLive(true);
          addLog(`[ELO] ELO mis a jour -- ${played.length} resultat(s)`);
        }
      };

      // ── SOURCE 1 : API-Football via Cloudflare proxy ──
      try{
        addLog("Chargement API-Football…");
        const AF_KEY="209aac3aaffd8d9e1e2e1a48190dccd0";
        const afUrl=`https://v3.football.api-sports.io/fixtures?league=1&season=2026`;
        const proxyUrl=`${CF_PROXY}?url=${encodeURIComponent(afUrl)}&apikey=${AF_KEY}`;
        addLog(`Appel proxy: ${proxyUrl.slice(0,80)}`);
        const afResp=await fetch(proxyUrl);
        addLog(`Reponse proxy: HTTP ${afResp.status}`);
        if(!afResp.ok) throw new Error(`HTTP ${afResp.status}`);
        const afData=await afResp.json();
        addLog(`JSON recu: ${JSON.stringify(afData).slice(0,120)}`);
        if(afData?.errors?.requests) throw new Error("quota dépassé: "+JSON.stringify(afData.errors));
        const raw=afData?.response||[];
        if(!raw.length) throw new Error(`response vide -- full: ${JSON.stringify(afData).slice(0,200)}`);
        const list=raw.map((m,i)=>({
          id:m.fixture?.id||i,
          home:m.teams?.home?.name||"TBD",
          away:m.teams?.away?.name||"TBD",
          date:m.fixture?.date?.slice(0,10)||"",
          time:m.fixture?.date?.slice(11,16)||"",
          group:m.league?.round||"",
          venue:m.fixture?.venue?.city||"Default",
          status:m.fixture?.status?.short||"NS",
          homeScore:m.goals?.home??null,
          awayScore:m.goals?.away??null,
        }));
        processMatches(list,"API-Football");
        return;
      }catch(e1){
        addLog(`[!] API-Football echoue: ${e1.message}`);
      }

      // ── SOURCE 2 : worldcup26.ir via Cloudflare proxy ──
      try{
        addLog("Tentative worldcup26.ir…");
        const wcUrl=`https://worldcup26.ir/get/games`;
        const wcResp=await fetch(`${CF_PROXY}?url=${encodeURIComponent(wcUrl)}`);
        addLog(`worldcup26.ir proxy: HTTP ${wcResp.status}`);
        if(!wcResp.ok) throw new Error(`HTTP ${wcResp.status}`);
        const d=await wcResp.json();
        const raw=Array.isArray(d)?d:d.games||d.matches||[];
        if(!raw.length) throw new Error("response vide");
        const list=raw.map((m,i)=>({
          id:m.id||i,home:m.home_team?.name_en||m.home_team||"TBD",
          away:m.away_team?.name_en||m.away_team||"TBD",
          date:m.date||"",time:m.time||"",group:m.group||m.stage||"",
          venue:m.stadium?.city_en||m.venue||"Default",
          status:m.status||"scheduled",
          homeScore:m.home_score??null,awayScore:m.away_score??null,
        }));
        processMatches(list,"worldcup26.ir");
        return;
      }catch(e2){
        addLog(`[!] worldcup26.ir echoue: ${e2.message}`);
      }

      // ── FALLBACK : démo intégrée ──
      addLog("Fallback démo chargée — toutes les analyses restent opérationnelles");
      setApiErr("Sources live indisponibles — démo intégrée chargée (analyses opérationnelles)");
      processMatches(DEMO,"démo");
      setLoading(false);
    })();
  },[]);

  const upcoming=matches.filter(m=>m.homeScore===null);

  const analyze=useCallback(async()=>{
    if(!sel)return;
    setBusy(true);setPred(null);

    addLog("① Météo Open-Meteo…");
    let wx=null,wm=1,am=1,wxN=[];
    const wData=await fetchWx(sel.venue||"Default",sel.date);
    if(wData){wx=wData;const wRes=wxM(wData.temp,wData.precip,wData.wind,wData.wmo);wm=wRes.mod;wxN=wRes.notes;am=altM(wData.alt);addLog(`(1) ${wData.temp}degC ${WMO[wData.wmo]||""}`);}

    let cotes={},lineupH=null,lineupA=null;
    if(apiKey.trim().length>8){
      addLog("② API-Football…");
      const today=sel.date?.slice(0,10)||new Date().toISOString().slice(0,10);
      const fix=await apif(`fixtures?league=1&season=2026&date=${today}`,apiKey);
      if(fix?.response?.length){
        const match=fix.response.find(f=>(f.teams.home.name.includes(sel.home)||sel.home.includes(f.teams.home.name))&&(f.teams.away.name.includes(sel.away)||sel.away.includes(f.teams.away.name)));
        if(match){
          const fid=match.fixture.id;
          const[lu,od]=await Promise.all([apif(`fixtures/lineups?fixture=${fid}`,apiKey),apif(`odds?fixture=${fid}&bookmaker=8`,apiKey)]);
          if(lu?.response?.length){lineupH=lu.response.find(t=>t.team.name.includes(sel.home));lineupA=lu.response.find(t=>t.team.name.includes(sel.away));}
          const b=od?.response?.[0]?.bookmakers?.[0]?.bets?.find(b=>b.name==="Match Winner");
          b?.values?.forEach(v=>{if(v.value==="Home")cotes.home=+v.odd;if(v.value==="Draw")cotes.draw=+v.odd;if(v.value==="Away")cotes.away=+v.odd;});
          if(cotes.home)addLog(`(2) Cotes: 1=${cotes.home} X=${cotes.draw} 2=${cotes.away}`);
        }
      }
    }

    const sMod=stake==="low"?0.88:stake==="decider"?0.82:1.0;
    const{lH,lA,eH,eA,eHB,eAB,injH,injA}=computeL(sel.home,sel.away,liveElo,wm,am,sMod);
    const mat=buildMatrix(lH,lA);
    const D=deriveAll(mat,sel.home,sel.away);
    addLog(`(3) lambda=${lH}/${lA} | ${sel.home} ${pct(D.pH)}`);

    // Value bets
    let vb=[];
    if(cotes.home){
      if(D.pH>1/cotes.home*1.05)vb.push({l:`1 ${sel.home}`,p:pct(D.pH),o:cotes.home,e:((D.pH*cotes.home-1)*100).toFixed(1)});
      if(D.pD>1/cotes.draw*1.05)vb.push({l:"Nul",p:pct(D.pD),o:cotes.draw,e:((D.pD*cotes.draw-1)*100).toFixed(1)});
      if(D.pA>1/cotes.away*1.05)vb.push({l:`2 ${sel.away}`,p:pct(D.pA),o:cotes.away,e:((D.pA*cotes.away-1)*100).toFixed(1)});
    }

    addLog("④ Analyse IA…");
    let ai="";
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:
`Expert paris sportifs WC 2026. Match: ${sel.home} vs ${sel.away}.
lambda: ${lH}/${lA} | ELO: ${eH}/${eA}${eH!==eHB?` (live D${eH-eHB>0?"+":""}${eH-eHB})`:""} 
1X2: ${pct(D.pH)}/${pct(D.pD)}/${pct(D.pA)} | Over2.5: ${pct(D.o25)} | BTTS: ${pct(D.btts)}
Score: ${D.best.h}-${D.best.a} (${pct(D.best.p)})
Blesses: ${[...(BASE_INJURIES[sel.home]||[]),...(BASE_INJURIES[sel.away]||[])].map(i=>i.p).join(", ")||"aucun"}
Meteo: ${wx?`${wx.temp} degC ${WMO[wx.wmo]||""}${wx.alt>1000?" alt."+wx.alt+"m":""}`:  "inconnue"}
${cotes.home?`Cotes book: 1=${cotes.home} X=${cotes.draw} 2=${cotes.away}`:""}
${vb.length?`Value bets: ${vb.map(v=>v.l).join(", ")}`:""}
En 4 phrases: (1) analyse tactique, (2) meilleur pari avec chiffres, (3) Over/Under optimal, (4) risque principal.`}]})});
      const dd=await r.json();ai=dd.content?.[0]?.text||"";addLog("④ IA OK");
    }catch{addLog("④ IA échouée");}

    setPred({home:sel.home,away:sel.away,venue:sel.venue,date:sel.date,lH,lA,eH,eA,eHB,eAB,D,wx,wxN,wm,am,sMod,injH,injA,cotes,vb,ai,lineupH,lineupA,ts:new Date().toLocaleTimeString("fr")});
    addLog(`[OK] ${sel.home} vs ${sel.away} termine`);
    setBusy(false);
  },[sel,stake,apiKey,liveElo]);

  const addToGrille=()=>{if(pred)setGrille(g=>{const e=g.find(x=>x.home===pred.home&&x.away===pred.away);return e?g.map(x=>x===e?pred:x):[...g,pred];});};

  return(
    <div style={S.app}>
      <div style={S.hdr}>
        <div style={{fontSize:"24px"}}>⚽</div>
        <div>
          <p style={S.title}>WC 2026 Predictor <span style={{color:C.green,fontSize:"11px",fontWeight:600}}>V5</span></p>
          <p style={S.sub}>ELO live · Poisson-DC · Météo · Compositions · Système ⭐ · Combinés</p>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:"5px"}}>
          {eloLive&&<span style={S.badgeG}>ELO⚡</span>}
          <span style={S.badge}>LIVE</span>
        </div>
      </div>

      <div style={S.main}>
        <div style={S.tabs}>
          {[["matches",`Matchs (${upcoming.length})`],["grille",`Grille (${grille.length})`],["elo",`ELO${eloLive?" [ELO]":""}`],["setup","Config"],["logs","Logs"]].map(([k,l])=>(
            <button key={k} style={{...S.tab,...(tab===k?S.tabA:{})}} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>

        {apiErr&&<div style={S.err}>⚠ {apiErr}</div>}
        {loading&&<div style={{textAlign:"center",padding:"24px",color:C.muted,fontSize:"13px"}}>Chargement + calcul ELO…</div>}

        {tab==="matches"&&!loading&&(<>
          {/* STICKY ANALYSE BAR */}
          <div style={{position:"sticky",top:0,zIndex:20,background:C.bg,paddingBottom:"10px",borderBottom:`1px solid ${C.border}`,marginBottom:"12px"}}>
            <div style={{display:"flex",gap:"5px",marginBottom:"7px",flexWrap:"wrap"}}>
              {[["normal","Standard"],["low","Déjà qualifié (−12%)"],["decider","Décisif (−18%)"]].map(([v,l])=>(
                <button key={v} onClick={()=>setStake(v)} style={{padding:"5px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:600,cursor:"pointer",border:"none",background:stake===v?C.green:C.card,color:stake===v?"#000":C.muted}}>{l}</button>
              ))}
            </div>
            <button style={{...S.btn,marginTop:0,...(!sel||busy?S.btnOff:{})}} disabled={!sel||busy} onClick={analyze}>
              {busy?"⚙️ Analyse en cours…":sel?`[pred] ${sel.home} vs ${sel.away}`:"⬇ Sélectionne un match ci-dessous"}
            </button>
            {busy&&<div style={{paddingTop:"8px"}}>
              <div style={{width:"100%",height:"3px",background:C.border,borderRadius:"2px",overflow:"hidden",marginBottom:"5px"}}>
                <div style={{width:"55%",height:"100%",background:`linear-gradient(90deg,${C.greenDim},${C.green},${C.gold})`,animation:"sl 1.1s ease-in-out infinite",borderRadius:"2px"}}/>
              </div>
              <div style={{color:C.muted,fontSize:"11px",textAlign:"center"}}>{log[0]||"…"}</div>
            </div>}
          </div>
          {/* MATCHS PAR DATE — passés filtrés */}
          {(()=>{
            const today=new Date();today.setHours(0,0,0,0);
            const allM=upcoming.length?upcoming:DEMO;
            const filtered=allM.filter(m=>{
              if(!m.date)return true;
              const d=new Date(m.date);d.setHours(0,0,0,0);
              return d>=today;
            });
            const byDate={};
            filtered.forEach(m=>{const k=m.date?.slice(0,10)||"—";if(!byDate[k])byDate[k]=[];byDate[k].push(m);});
            const dates=Object.keys(byDate).sort();
            if(!dates.length)return(<div style={{textAlign:"center",color:C.muted,padding:"24px",fontSize:"13px"}}>Aucun match à venir.</div>);
            return dates.map(date=>{
              const isToday=date===new Date().toISOString().slice(0,10);
              const label=isToday?"🟢 Aujourd'hui":new Date(date+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
              return(
                <div key={date} style={{marginBottom:"16px"}}>
                  <div style={{fontSize:"11px",fontWeight:700,color:isToday?C.green:C.gold,letterSpacing:"1px",textTransform:"uppercase",marginBottom:"7px",paddingBottom:"4px",borderBottom:`1px solid ${C.border}`}}>
                    {label}
                  </div>
                  <div style={S.grid}>
                    {byDate[date].map(m=>{
                      const s=sel?.id===m.id;
                      const eH=liveElo[m.home]||ELO_BASE[m.home]||1850;
                      const eA=liveElo[m.away]||ELO_BASE[m.away]||1850;
                      const dH=eH-(ELO_BASE[m.home]||1850);
                      const dA=eA-(ELO_BASE[m.away]||1850);
                      return(
                        <div key={m.id} style={{...S.mc,...(s?S.mcS:{})}} onClick={()=>{setSel(m);setPred(null);}}>
                          <div style={S.mr}>
                            <div style={{flex:1}}>
                              <div style={S.tn}>{m.home}</div>
                              <div style={{fontSize:"10px",color:dH>0?C.green:dH<0?C.red:C.muted}}>ELO {eH}{dH!==0?` (${dH>0?"+":""}${dH})`:""}</div>
                            </div>
                            <div style={{textAlign:"center",minWidth:"44px"}}>
                              <div style={S.vs}>VS</div>
                              <div style={{fontSize:"10px",color:C.muted,marginTop:"2px"}}>{m.time?.slice(0,5)}</div>
                            </div>
                            <div style={{flex:1,textAlign:"right"}}>
                              <div style={{...S.tn,...S.tnR}}>{m.away}</div>
                              <div style={{fontSize:"10px",color:dA>0?C.green:dA<0?C.red:C.muted,textAlign:"right"}}>ELO {eA}{dA!==0?` (${dA>0?"+":""}${dA})`:""}</div>
                            </div>
                          </div>
                          <div style={S.mm}>
                            <span style={{color:C.muted}}>Gr.{m.group}</span>
                            <span style={{color:C.gold}}>📍 {m.venue||"—"}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            });
          })()}
          {pred&&<PredResult p={pred} onAdd={addToGrille}/>}
        </>)}

        {tab==="grille"&&(grille.length===0
          ?<div style={{textAlign:"center",padding:"32px",color:C.muted}}>Ajoute des analyses depuis l'onglet Matchs.</div>
          :<GrilleView grille={grille} onRemove={i=>setGrille(g=>g.filter((_,idx)=>idx!==i))}/>
        )}
        {tab==="elo"&&<EloView liveElo={liveElo} history={eloHistory}/>}
        {tab==="setup"&&<Setup apiKey={apiKey} setApiKey={setApiKey}/>}
        {tab==="logs"&&<div>
          <div style={S.st}>Activité</div>
          {log.map((l,i)=><div key={i} style={{fontSize:"11px",color:i===0?C.green:C.muted,padding:"4px 0",borderBottom:`1px solid ${C.border}`}}>{l}</div>)}
        </div>}
      </div>
      <style>{`@keyframes sl{0%{transform:translateX(-100%)}100%{transform:translateX(220%)}}\n*{box-sizing:border-box;}body{margin:0;}input:focus{border-color:#00e676!important;}`}</style>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   PREDICTION RESULT — V5 with full bet sections + stars
   ═══════════════════════════════════════════════════════════════ */
function PredResult({p,onAdd}){
  const{home,away,lH,lA,eH,eA,eHB,eAB,D,wx,wxN,injH,injA,cotes,vb,ai,lineupH,lineupA,ts,sMod}=p;
  const win=D.pH>D.pD&&D.pH>D.pA?"home":D.pA>D.pH&&D.pA>D.pD?"away":"draw";
  const eloLive=eH!==eHB||eA!==eAB;

  return(
    <div style={S.rcard}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
        <div style={{fontSize:"10px",color:C.muted}}>{ts}{eloLive&&<span style={{color:C.gold,marginLeft:"6px"}}>⚡ ELO live</span>}</div>
        <button onClick={onAdd} style={{background:C.goldDim,color:"#000",border:"none",borderRadius:"5px",padding:"4px 10px",fontSize:"10px",fontWeight:700,cursor:"pointer"}}>+ Grille</button>
      </div>

      {/* Score */}
      <div style={{textAlign:"center"}}>
        <div style={S.sc}>Score le plus probable</div>
        <div style={S.srow}>
          <div><div style={{fontSize:"11px",color:C.muted,marginBottom:"2px"}}>{home}</div><div style={S.sbig}>{D.best.h}</div></div>
          <div style={S.ssep}>—</div>
          <div><div style={{fontSize:"11px",color:C.muted,marginBottom:"2px"}}>{away}</div><div style={S.sbig}>{D.best.a}</div></div>
        </div>
        <div style={{fontSize:"10px",color:C.muted}}>Prob. {pct(D.best.p)} · lambda {lH}/{lA} · ELO {eH}{eH!==eHB?` (${eH-eHB>0?"+":""}${eH-eHB})`:""} / {eA}{eA!==eAB?` (${eA-eAB>0?"+":""}${eA-eAB})`:""}</div>
        <div style={{marginTop:"8px"}}>
          {win==="home"&&<span style={{...S.otag,background:"#082a10",color:C.green}}>✓ Victoire {home} ({pct(D.pH)})</span>}
          {win==="draw"&&<span style={{...S.otag,background:"#08182a",color:C.blue}}>⚖ Match nul ({pct(D.pD)})</span>}
          {win==="away"&&<span style={{...S.otag,background:"#200808",color:C.red}}>✓ Victoire {away} ({pct(D.pA)})</span>}
        </div>
      </div>

      {/* Value bets */}
      {vb.length>0&&<div style={{marginTop:"9px",padding:"8px 10px",background:"#060f07",border:`1px solid ${C.green}`,borderRadius:"7px"}}>
        <div style={{fontSize:"10px",fontWeight:700,color:C.green,marginBottom:"4px"}}>⭐ VALUE BETS — Edge détecté vs bookmaker</div>
        {vb.map(v=><div key={v.l} style={{fontSize:"11px",color:C.text,marginBottom:"1px"}}><strong>{v.l}</strong> — modèle {v.p} vs cote {v.o} → +{v.e}%</div>)}
      </div>}

      {/* ── SECTION 1 : Résultat 1X2 ── */}
      <div style={S.sec}>
        <div style={S.st}>① Résultat 1X2</div>
        <BetRow label={`Victoire ${home}`} prob={D.pH} marketType="1x2" bookOdd={cotes.home}/>
        <BetRow label="Match nul" prob={D.pD} marketType="1x2" bookOdd={cotes.draw}/>
        <BetRow label={`Victoire ${away}`} prob={D.pA} marketType="1x2" bookOdd={cotes.away}/>
      </div>

      {/* ── SECTION 2 : Over/Under ── */}
      <div style={S.sec}>
        <div style={S.st}>② Over / Under buts</div>
        <BetRow label="Over 1.5 buts" prob={D.o15} marketType="ou"/>
        <BetRow label="Over 2.5 buts" prob={D.o25} marketType="ou"/>
        <BetRow label="Under 2.5 buts" prob={D.u25} marketType="ou"/>
        <BetRow label="Over 3.5 buts" prob={D.o35} marketType="ou"/>
        <BetRow label="Les deux marquent (BTTS)" prob={D.btts} marketType="ou"/>
      </div>

      {/* ── SECTION 3 : Paris combinés Résultat × O/U ── */}
      <div style={S.sec}>
        <div style={S.st}>③ Paris combinés Résultat × Over/Under</div>
        {[
          {l:`${home} & Over 1.5`, p:sumWhere2(D,home,away,"hw","o15")},

      {/* Facteurs */}

          {wx&&<span style={{...S.chip,...S.chipB}}>{WXE[wx.wmo]||"🌤"} {wx.temp} degC — {wx.stadium}</span>}
          {wx?.alt>1000&&<span style={{...S.chip,...S.chipW}}>⛰ Altitude {wx.alt}m</span>}
          {wxN.map(n=><span key={n} style={{...S.chip,...S.chipW}}>{n}</span>)}
          {eloLive&&<span style={{...S.chip,...S.chipO}}>⚡ ELO recalculé</span>}
          {sMod<1&&<span style={{...S.chip,...S.chipW}}>⚠ Enjeu ×{sMod}</span>}
          {lineupH&&<span style={{...S.chip,...S.chipG}}>✓ XI {home}</span>}
          {lineupA&&<span style={{...S.chip,...S.chipG}}>✓ XI {away}</span>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}}>

// Helper: recompute combos from D object
function sumWhere2(D,home,away,result,ouType){
  // We need the raw matrix — store it in D for combos
  // Approximate from stored marginals (accurate enough)
  const rP = result==="hw"?D.pH:result==="d"?D.pD:D.pA;
  const ouP = ouType==="o15"?D.o15:ouType==="o25"?D.o25:ouType==="u25"?D.u25:D.o35;
  // Correlation adjustment (result and OU are correlated)
  // For home win + over: likely higher correlation (high-scoring = usually one team dominates)
  // Simple estimate: p(A∩B) ≈ p(A) * p(B) * (1 + corr)
  const corr = (result==="hw"&&ouType==="o25") ? 0.15
             : (result==="aw"&&ouType==="o25") ? 0.10
             : (result==="d"&&ouType==="u25")  ? 0.20
             : (result==="hw"&&ouType==="u25") ? -0.20
             : 0.05;
  return Math.max(0.01, Math.min(0.95, rP * ouP * (1 + corr)));
}

function GrilleView({grille,onRemove}){
  const today=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  // Find best bet per match (highest star rating)
  function bestBet(p){
    const D=p.D;
    const bets=[
      {l:`1 ${p.home}`,prob:D.pH,t:"1x2",bk:p.cotes.home},
      {l:"Nul",prob:D.pD,t:"1x2",bk:p.cotes.draw},
      {l:`2 ${p.away}`,prob:D.pA,t:"1x2",bk:p.cotes.away},
      {l:"Over 1.5",prob:D.o15,t:"ou"},
      {l:"Over 2.5",prob:D.o25,t:"ou"},
      {l:"Under 2.5",prob:D.u25,t:"ou"},
      {l:"BTTS Non",prob:1-D.btts,t:"ou"},
    ];
    return bets.map(b=>({...b,r:starRating(b.prob,b.t,b.bk)})).sort((a,z)=>z.r.stars-a.r.stars||z.prob-a.prob)[0];
  }
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"11px"}}>
        <div style={{fontSize:"13px",fontWeight:700,color:C.white}}>Grille du {today}</div>
        <div style={{fontSize:"10px",color:C.muted}}>{grille.length} match{grille.length>1?"s":""}</div>
      </div>
      <div style={S.grille}>
        {grille.map((p,i)=>{
          const win=p.D.pH>p.D.pD&&p.D.pH>p.D.pA?"home":p.D.pA>p.D.pH&&p.D.pA>p.D.pD?"away":"draw";
          const best=bestBet(p);
          return(
            <div key={i} style={S.gr}>
              <div style={S.grH}>
                <div>
                  <div style={S.grM}>{p.home} vs {p.away}</div>
                  <div style={{fontSize:"9px",color:C.muted}}>{p.date?.slice(0,10)} · {p.venue}{p.eH!==p.eHB||p.eA!==p.eAB?" · ⚡ELO":""}</div>
                </div>
                <button onClick={()=>onRemove(i)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"14px"}}>×</button>
              </div>
              {/* Best bet highlight */}
              <div style={{background:"#080f08",border:`1px solid ${best.r.color}44`,borderRadius:"6px",padding:"7px 10px",marginBottom:"7px"}}>
                <div style={{fontSize:"10px",color:C.muted,marginBottom:"2px"}}>Meilleur pari</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:"12px",fontWeight:700,color:C.white}}>{best.l}</span>
                  <span style={{display:"flex",gap:"8px",alignItems:"center"}}>
                    <span style={{fontSize:"12px",fontWeight:700,color:best.r.color}}>{pct(best.prob)}</span>
                    <Stars n={best.r.stars} color={best.r.color}/>
                  </span>
                </div>
              </div>
              <div style={S.grRow}>
                <span style={{...S.chip,...(win==="home"?S.chipG:{})}}>1 {pct(p.D.pH)}</span>
                <span style={{...S.chip,...(win==="draw"?S.chipB:{})}}>X {pct(p.D.pD)}</span>
                <span style={{...S.chip,...(win==="away"?S.chipW:{})}}>2 {pct(p.D.pA)}</span>
                <span style={S.chip}>O2.5 {pct(p.D.o25)}</span>
                <span style={S.chip}>U2.5 {pct(p.D.u25)}</span>
                <span style={S.chip}>BTTS {pct(p.D.btts)}</span>
                {p.wx&&<span style={{...S.chip,...S.chipB}}>{WXE[p.wx.wmo]||"🌤"} {p.wx.temp} degC</span>}
                {p.vb?.length>0&&<span style={{...S.chip,...S.chipO}}>⭐Value</span>}
              </div>
              {p.ai&&<p style={{fontSize:"11px",color:C.muted,margin:"7px 0 0",lineHeight:1.55}}>{p.ai.split(".")[0]}.</p>}
            </div>
          );
        })}
      </div>
    </div>
  );
}
