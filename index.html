/* ═══════════════════════════════════════════════════════════════
   ELO ENGINE  (K=60, MoV multiplier)
   ═══════════════════════════════════════════════════════════════ */
function eloExp(a, b) {
  return 1 / (1 + Math.pow(10, (b - a) / 400));
}
function movMul(d) {
  if (d <= 1) return 1.0;
  if (d === 2) return 1.5;
  if (d === 3) return 1.75;
  return Math.min(2.5, 1.75 + (d - 3) * 0.1);
}
function updateElo(eH, eA, sH, sA) {
  const d = Math.abs(sH - sA),
    mov = movMul(d),
    eXH = eloExp(eH, eA);
  const rH = sH > sA ? 1 : sH === sA ? 0.5 : 0;
  const dH = Math.round(60 * mov * (rH - eXH));
  return {
    newH: eH + dH,
    newA: eA - dH,
    dH,
    dA: -dH
  };
}

/* ═══════════════════════════════════════════════════════════════
   POISSON + DIXON-COLES
   ═══════════════════════════════════════════════════════════════ */
function fact(n) {
  return n <= 1 ? 1 : n * fact(n - 1);
}
function pPMF(k, l) {
  if (l <= 0) return k === 0 ? 1 : 0;
  return Math.pow(l, k) * Math.exp(-l) / fact(Math.min(k, 20));
}
function dcC(h, a, lH, lA, p = -0.10) {
  if (h === 0 && a === 0) return 1 - lH * lA * p;
  if (h === 0 && a === 1) return 1 + lH * p;
  if (h === 1 && a === 0) return 1 + lA * p;
  if (h === 1 && a === 1) return 1 - p;
  return 1;
}
function buildMatrix(lH, lA, max = 7) {
  const m = [];
  let t = 0;
  for (let h = 0; h <= max; h++) {
    m[h] = [];
    for (let a = 0; a <= max; a++) {
      const v = pPMF(h, lH) * pPMF(a, lA) * dcC(h, a, lH, lA);
      m[h][a] = v;
      t += v;
    }
  }
  for (let h = 0; h <= max; h++) for (let a = 0; a <= max; a++) m[h][a] /= t;
  return m;
}

/* ── All derived probabilities from matrix ── */
function deriveAll(m, home, away) {
  let pH = 0,
    pD = 0,
    pA = 0;
  let o15 = 0,
    o25 = 0,
    o35 = 0,
    u25 = 0,
    btts = 0;
  const tgH = [0, 0, 0, 0],
    tgA = [0, 0, 0, 0]; // 0,1,2,3+ goals per team

  for (let h = 0; h < m.length; h++) for (let a = 0; a < m[h].length; a++) {
    const v = m[h][a],
      t = h + a;
    if (h > a) pH += v;else if (h === a) pD += v;else pA += v;
    if (t > 1.5) o15 += v;
    if (t > 2.5) o25 += v;else u25 += v;
    if (t > 3.5) o35 += v;
    if (h > 0 && a > 0) btts += v;
    tgH[Math.min(h, 3)] += v;
    tgA[Math.min(a, 3)] += v;
  }

  // Best score
  let bv = 0,
    bh = 0,
    ba = 0;
  for (let h = 0; h < m.length; h++) for (let a = 0; a < m[h].length; a++) if (m[h][a] > bv) {
    bv = m[h][a];
    bh = h;
    ba = a;
  }

  // Top 6 scorelines
  const lines = [];
  for (let h = 0; h < m.length; h++) for (let a = 0; a < m[h].length; a++) lines.push({
    h,
    a,
    p: m[h][a]
  });
  lines.sort((x, y) => y.p - x.p);

  // Score families
  const famHome = [1, 2, 3].reduce((s, g) => {
    const sub = [0, 1, 2].map(a => m[g]?.[a] || 0).reduce((a, b) => a + b, 0);
    return s + sub;
  }, 0);
  // Result + OU combos
  const combos = [{
    label: `${home} & Over 1.5`,
    p: sumWhere(m, (h, a) => h > a && h + a > 1.5),
    type: "combo"
  }, {
    label: `${home} & Over 2.5`,
    p: sumWhere(m, (h, a) => h > a && h + a > 2.5),
    type: "combo"
  }, {
    label: `${home} & Under 2.5`,
    p: sumWhere(m, (h, a) => h > a && h + a <= 2.5),
    type: "combo"
  }, {
    label: `Nul & Under 2.5`,
    p: sumWhere(m, (h, a) => h === a && h + a <= 2.5),
    type: "combo"
  }, {
    label: `${away} & Under 2.5`,
    p: sumWhere(m, (h, a) => h < a && h + a <= 2.5),
    type: "combo"
  }, {
    label: `${home} & Over 1.5 buts`,
    p: sumWhere(m, (h, a) => h > a && h + a > 1.5),
    type: "combo"
  }];
  return {
    pH,
    pD,
    pA,
    o15,
    o25,
    o35,
    u25,
    btts,
    tgH,
    tgA,
    best: {
      h: bh,
      a: ba,
      p: bv
    },
    top6: lines.slice(0, 6),
    combos
  };
}
function sumWhere(m, cond) {
  let s = 0;
  for (let h = 0; h < m.length; h++) for (let a = 0; a < m[h].length; a++) if (cond(h, a)) s += m[h][a];
  return s;
}

/* ── Lambda computation ── */
function computeL(home, away, liveElo, wMod = 1, aMod = 1, sMod = 1, xH = [], xA = []) {
  const eH = liveElo[home] || ELO_BASE[home] || 1850,
    eA = liveElo[away] || ELO_BASE[away] || 1850;
  const qH = QUAL[home] || {
      atk: 1.5,
      def: 1.0,
      form: "WWDLD"
    },
    qA = QUAL[away] || {
      atk: 1.5,
      def: 1.0,
      form: "WWDLD"
    };
  const efH = 1 / (1 + Math.pow(10, -(eH - eA) / 400)),
    efA = 1 - efH;
  const fmS = f => (f || "WWDLD").slice(-5).split("").reduce((s, c) => s + (c === "W" ? 3 : c === "D" ? 1 : 0), 0);
  const fH = 0.85 + fmS(qH.form) / 15 * 0.30,
    fA = 0.85 + fmS(qA.form) / 15 * 0.30;
  const injH = [...(BASE_INJURIES[home] || []), ...xH],
    injA = [...(BASE_INJURIES[away] || []), ...xA];
  const mal = (inj, r) => Math.min(0.28, inj.filter(i => i.r === r || i.r === "MID").reduce((s, i) => s + i.i, 0));
  let lH = 1.30 * (0.6 + efH * 0.8) * (qH.atk / 1.9) * fH * (1 - mal(injH, "ATT")) * wMod * aMod * sMod;
  let lA = 1.30 * (0.6 + efA * 0.8) * (qA.atk / 1.9) * fA * (1 - mal(injA, "ATT")) * wMod * aMod * sMod;
  const k1 = `${home}_${away}`,
    k2 = `${away}_${home}`;
  if (H2H_BIAS[k1]) {
    lH *= 1 + H2H_BIAS[k1];
    lA *= 1 - H2H_BIAS[k1] * 0.5;
  }
  if (H2H_BIAS[k2]) {
    lA *= 1 + H2H_BIAS[k2];
    lH *= 1 - H2H_BIAS[k2] * 0.5;
  }
  return {
    lH: +Math.max(0.2, Math.min(4, lH)).toFixed(3),
    lA: +Math.max(0.2, Math.min(4, lA)).toFixed(3),
    eH,
    eA,
    eHB: ELO_BASE[home] || 1850,
    eAB: ELO_BASE[away] || 1850,
    injH,
    injA
  };
}
